<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KarigarBook">
  <rect width="64" height="64" rx="14" fill="#6D28D9"/>
  <!-- stitched ledger page -->
  <rect x="17" y="13" width="30" height="38" rx="3" fill="#F7F5F0"/>
  <!-- running-stitch seam down the spine -->
  <g stroke="#6D28D9" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3">
    <line x1="24" y1="15" x2="24" y2="49"/>
  </g>
  <!-- ledger rows -->
  <g stroke="#8B7FA8" stroke-width="2" stroke-linecap="round">
    <line x1="29" y1="22" x2="42" y2="22"/>
    <line x1="29" y1="29" x2="42" y2="29"/>
    <line x1="29" y1="36" x2="42" y2="36"/>
  </g>
  <!-- gold thread tick = a cleared payout -->
  <path d="M28 43.5 l3 3 l6 -7" fill="none" stroke="#E8B923" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
